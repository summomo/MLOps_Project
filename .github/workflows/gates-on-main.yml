name: gates

on:
  pull_request:
    branches: [ "main" ]

jobs:
  run-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for staging readiness
        env:
          STAGING_URL: ${{ secrets.STAGING_URL != '' && secrets.STAGING_URL || vars.STAGING_URL != '' && vars.STAGING_URL || 'https://mlops-api-staging.onrender.com' }}
        run: |
          echo "Using STAGING_URL=${STAGING_URL}"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/ready" || true)
            if [ "$code" = "200" ]; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Waiting for staging readiness (${i}/30), status=${code}"
            sleep 20
          done
          echo "Staging /ready did not become 200 within 10 minutes"
          exit 1

      - name: Run staging gates
        env:
          STAGING_URL: ${{ secrets.STAGING_URL != '' && secrets.STAGING_URL || vars.STAGING_URL != '' && vars.STAGING_URL || 'https://mlops-api-staging.onrender.com' }}
        run: |
          python ml/src/gates.py
